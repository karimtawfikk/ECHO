version: '3.8'

services:
  db:
    image: ankane/pgvector
    container_name: ${CONTAINER_NAME}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

#run with: docker-compose up -d
#pulls an already built image from Docker Hub, creates a container named "echo_db", sets environment variables for the database credentials, maps port 5432 to the host, and creates a volume for data persistence.